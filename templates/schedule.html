{% extends "base.html" %}
{% set active_tab = 'schedule' %}
{% set tab_name = 'Active Schedule' %}

{% block extra_css %}
<style>
    .schedule-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.5rem;
    }
    .day-cell {
        min-height: 140px;
    }
</style>
{% endblock %}

{% block content %}
<main class="flex-1 flex overflow-hidden">
    <!-- Main Schedule Section -->
    <section class="flex-1 flex flex-col p-6 gap-4 overflow-hidden">
        <!-- Action Row -->
        <div class="flex justify-center items-center gap-4 shrink-0">
            <button id="regenerate-btn" class="bg-gradient-to-r from-secondary to-secondary-container text-on-secondary px-8 py-3 rounded-xl font-bold tracking-wide shadow-lg shadow-secondary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-3">
                <span class="material-symbols-outlined">sync</span>
                REGENERATE SCHEDULE
            </button>
            <div class="flex items-center gap-2 bg-surface-container-high rounded-xl px-4 py-2 border border-outline-variant/30">
                <span class="text-[10px] font-black uppercase text-outline">Current View</span>
                <span id="current-period" class="text-xs font-bold text-primary">March 2024</span>
            </div>
        </div>

        <!-- Calendar Container -->
        <div class="flex-1 bg-surface-container-low rounded-2xl flex flex-col overflow-hidden shadow-2xl border border-outline-variant/20">
            <!-- Days Header -->
            <div class="grid grid-cols-5 bg-surface-container-high border-b border-outline-variant/30 shrink-0">
                <div class="py-3 text-center text-[10px] font-black text-outline tracking-widest border-r border-outline-variant/10">MON</div>
                <div class="py-3 text-center text-[10px] font-black text-outline tracking-widest border-r border-outline-variant/10">TUE</div>
                <div class="py-3 text-center text-[10px] font-black text-outline tracking-widest border-r border-outline-variant/10">WED</div>
                <div class="py-3 text-center text-[10px] font-black text-outline tracking-widest border-r border-outline-variant/10">THU</div>
                <div class="py-3 text-center text-[10px] font-black text-outline tracking-widest">FRI</div>
            </div>
            
            <!-- Dynamic Grid -->
            <div id="schedule-grid" class="schedule-grid flex-1 overflow-y-auto custom-scrollbar p-2">
                <!-- JS will inject days here -->
            </div>
        </div>
    </section>

    <!-- Sidebar Analytics -->
    <aside class="w-80 bg-surface-container border-l border-outline-variant/20 flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.2)] shrink-0 overflow-y-auto">
        <div class="p-6 flex flex-col gap-8">
            <!-- Stats -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary">analytics</span>
                    <h3 class="text-xs font-black uppercase tracking-widest text-on-surface">Physician Load</h3>
                </div>
                <div class="bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/10 shadow-inner">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-surface-container-highest/50 text-outline border-b border-outline-variant/10">
                            <tr>
                                <th class="px-3 py-2 font-bold">Name</th>
                                <th class="px-2 py-2 text-center">Tgt</th>
                                <th class="px-2 py-2 text-center">Act</th>
                                <th class="px-3 py-2 text-right">+/-</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-stats-body" class="divide-y divide-outline-variant/5">
                            <!-- JS injected rows -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Alerts -->
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-error">warning</span>
                    <h3 class="text-xs font-black uppercase tracking-widest text-on-surface">Algorithm Issues</h3>
                </div>
                <div id="schedule-alerts-list" class="space-y-3">
                    <!-- JS injected alerts -->
                </div>
            </section>
        </div>
    </aside>
</main>
{% endblock %}
