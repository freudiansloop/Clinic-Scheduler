<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container": "#171f33",
            "primary-fixed": "#e1e0ff",
            "tertiary-fixed": "#eddcff",
            "on-tertiary-container": "#32214c",
            "surface-tint": "#c0c1ff",
            "surface-variant": "#2d3449",
            "tertiary": "#d4bdf2",
            "surface-container-lowest": "#060e20",
            "surface-container-high": "#222a3d",
            "inverse-surface": "#dae2fd",
            "tertiary-container": "#9d87b9",
            "primary-fixed-dim": "#c0c1ff",
            "secondary-fixed": "#4fffb0",
            "surface-dim": "#0b1326",
            "on-surface": "#dae2fd",
            "primary": "#c0c1ff",
            "surface-bright": "#31394d",
            "on-primary-container": "#0d0096",
            "on-secondary": "#003822",
            "tertiary-fixed-dim": "#d4bdf2",
            "surface": "#0b1326",
            "inverse-primary": "#494bd6",
            "on-primary-fixed-variant": "#2f2ebe",
            "on-tertiary-fixed": "#24123c",
            "secondary-fixed-dim": "#1ee296",
            "secondary-container": "#00d98f",
            "surface-container-highest": "#2d3449",
            "on-error": "#690005",
            "outline-variant": "#464554",
            "primary-container": "#8083ff",
            "on-primary": "#1000a9",
            "error": "#ffb4ab",
            "on-tertiary": "#392853",
            "secondary": "#43f6a8",
            "surface-container-low": "#131b2e",
            "on-secondary-container": "#005938",
            "error-container": "#93000a",
            "on-tertiary-fixed-variant": "#513e6b",
            "background": "#0b1326",
            "outline": "#908fa0",
            "on-secondary-fixed": "#002112",
            "on-secondary-fixed-variant": "#005233",
            "on-error-container": "#ffdad6",
            "inverse-on-surface": "#283044",
            "on-primary-fixed": "#07006c",
            "on-surface-variant": "#c7c4d7",
            "on-background": "#dae2fd"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 10px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-surface text-on-surface custom-scrollbar overflow-hidden flex flex-col h-screen" data-mode="connect">
<!-- Top Navigation Bar -->
<header class="w-full bg-[#131b2e] border-b border-outline-variant/10 z-50 flex items-center justify-between px-8 py-3 shrink-0 shadow-lg">
    <div class="flex items-center gap-8">
        <div>
            <h1 class="text-lg font-bold tracking-tighter text-[#dae2fd]">OC Clinic Scheduler</h1>
            <p class="text-[9px] uppercase tracking-widest text-outline font-bold">{{ tab_name }}</p>
        </div>
        <nav class="flex items-center gap-1">
            <a class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 {{ 'bg-[#2d3449] text-[#c0c1ff]' if active_tab == 'physicians' else 'text-[#908fa0] hover:bg-[#222a3d] hover:text-[#dae2fd]' }} font-['Inter'] text-sm font-medium" href="/">
                <span class="material-symbols-outlined text-lg">medical_services</span>
                <span>Physicians</span>
            </a>
            <a class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 {{ 'bg-[#2d3449] text-[#c0c1ff]' if active_tab == 'needs' else 'text-[#908fa0] hover:bg-[#222a3d] hover:text-[#dae2fd]' }} font-['Inter'] text-sm font-medium" href="/needs">
                <span class="material-symbols-outlined text-lg">vaccines</span>
                <span>Clinic Needs</span>
            </a>
            <a class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 {{ 'bg-[#2d3449] text-[#c0c1ff]' if active_tab == 'schedule' else 'text-[#908fa0] hover:bg-[#222a3d] hover:text-[#dae2fd]' }} font-['Inter'] text-sm font-medium" href="/schedule">
                <span class="material-symbols-outlined text-lg">calendar_month</span>
                <span>Schedule</span>
            </a>
            <a class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 {{ 'bg-[#2d3449] text-[#c0c1ff]' if active_tab == 'data' else 'text-[#908fa0] hover:bg-[#222a3d] hover:text-[#dae2fd]' }} font-['Inter'] text-sm font-medium" href="/data">
                <span class="material-symbols-outlined text-lg">database</span>
                <span>Data Management</span>
            </a>
            <a class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 {{ 'bg-[#2d3449] text-[#c0c1ff]' if active_tab == 'instructions' else 'text-[#908fa0] hover:bg-[#222a3d] hover:text-[#dae2fd]' }} font-['Inter'] text-sm font-medium" href="/instructions">
                <span class="material-symbols-outlined text-lg">description</span>
                <span>Instructions</span>
            </a>
        </nav>
    </div>
</header>
{% block content %}{% endblock %}

<script src="/static/app.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
