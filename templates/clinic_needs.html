{% extends "base.html" %}
{% set active_tab = 'needs' %}
{% set tab_name = 'Clinic Coverage Targets' %}

{% block extra_css %}
<style>
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.75rem;
    }
    .day-cell {
        min-height: 100px;
    }
</style>
{% endblock %}

{% block content %}
<div class="flex flex-col h-full space-y-4">
    <!-- Global Controls Row -->
    <div class="flex-none bg-surface-container-low p-3 rounded-xl flex flex-wrap items-center gap-4 border border-outline-variant/5 shadow-inner">
        <div class="flex flex-col gap-1">
            <label class="text-[10px] uppercase tracking-widest text-outline font-bold ml-1">Month</label>
            <select id="month-select" class="bg-surface-container-high border-none text-on-surface text-sm rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-primary/20 w-36">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3" selected>March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-[10px] uppercase tracking-widest text-outline font-bold ml-1">Year</label>
            <select id="year-select" class="bg-surface-container-high border-none text-on-surface text-sm rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-primary/20 w-24">
                <option value="2024" selected>2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-[10px] uppercase tracking-widest text-outline font-bold ml-1">Second Half Starts On:</label>
            <select id="split-select" class="bg-surface-container-high border-none text-on-surface text-sm rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-primary/20 w-40">
                <option value="Automatic" selected>Automatic</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
            </select>
        </div>
        
        <div class="flex items-end h-full mt-auto ml-auto gap-2">
            <button id="reset-needs-btn" class="bg-surface-container-high text-primary border border-primary/20 hover:bg-surface-container-highest px-4 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">restart_alt</span>
                Reset to Standard
            </button>
            <button id="save-needs-btn" class="bg-primary/10 text-primary border border-primary/20 hover:bg-primary/20 px-4 py-1.5 rounded-lg text-xs font-bold transition-all shadow-lg shadow-primary/5">
                Save Coverage Settings
            </button>
        </div>
    </div>

    <!-- Calendar Container -->
    <div class="flex-grow flex flex-col min-h-0 bg-surface-container-low/30 rounded-2xl p-6 border border-outline-variant/5">
        <!-- Day Labels -->
        <div class="grid grid-cols-7 gap-3 mb-4 flex-none">
            <div class="text-center py-2 text-secondary/60 text-[10px] uppercase font-black tracking-[0.25em]">Sunday</div>
            <div class="text-center py-2 text-outline text-[10px] uppercase font-black tracking-[0.25em]">Monday</div>
            <div class="text-center py-2 text-outline text-[10px] uppercase font-black tracking-[0.25em]">Tuesday</div>
            <div class="text-center py-2 text-outline text-[10px] uppercase font-black tracking-[0.25em]">Wednesday</div>
            <div class="text-center py-2 text-outline text-[10px] uppercase font-black tracking-[0.25em]">Thursday</div>
            <div class="text-center py-2 text-outline text-[10px] uppercase font-black tracking-[0.25em]">Friday</div>
            <div class="text-center py-2 text-secondary/60 text-[10px] uppercase font-black tracking-[0.25em]">Saturday</div>
        </div>
        
        <!-- Interactive Grid -->
        <div id="calendar-grid" class="calendar-grid flex-grow overflow-y-auto custom-scrollbar pr-1">
            <!-- Dynamic Content -->
        </div>
    </div>
</div>
{% endblock %}
